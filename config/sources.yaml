# Data source URLs and config.
# All scraper URLs live here — no URLs hardcoded in scraper modules.
# Update when source sites change routes (especially at FIFA year transition).

game_edition: fc26

sources:
  futgg:
    enabled: true
    base_url: "https://www.fut.gg"
    # Scraping method: Playwright DOM scraping of public pages only (NOT /api/*)
    # robots.txt disallows /api/* — we navigate public pages and read rendered DOM
    endpoints:
      hot_cards: "/players/trending/"          # public trending list, platform-switched via UI
      card_detail: "/players/{slug}/{card_key}/"  # card detail page (slug found from trending list)
    rate_limit_min_seconds: 5
    rate_limit_max_seconds: 10

  # Future sources (Phase 2):
  twitter:
    enabled: false
    accounts:
      - "FUTSheriff"
      - "FUTScoreboard"
      - "FUTDonkey"
    cookies_path: "data/.cookies/x.json"
    poll_interval_minutes: 10

  discord:
    enabled: false
    config_path: "config/discord_servers.yaml"

  reddit:
    enabled: false
    subreddits:
      - "FUT_Economy"
      - "EASportsFC"
    poll_interval_minutes: 30

  ea_news:
    enabled: false
    rss_url: "https://www.ea.com/games/ea-sports-fc/rss"
    poll_interval_minutes: 60
