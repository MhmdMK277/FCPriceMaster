# Known annual promo windows for EA FC Ultimate Team.
# Dates are approximate; confirmed dates come from EA announcements (signals table).
# Used to inject promo proximity and end-of-cycle context into LLM prompts.

# Game cycle config — update this each year when a new game launches.
game_cycle:
  current_game: "FC26"
  next_game_launch: "2026-09-26"  # approximate; update when EA announces
  next_game_name: "FC27"

# End-of-cycle events
end_of_cycle:
  # FUTTIES: EA's end-of-cycle celebration. Historically late July / August.
  # Repeatable 85x10 SBC spikes 85-rated demand and floods all other supply.
  futties_window_start: "07-18"  # MM-DD — approximate; update when EA announces
  futties_window_end: "09-01"    # runs until new game launch window

promos:
  - name: Winter Wildcards
    window_start: "12-01"  # MM-DD
    window_end: "12-20"
    notes: Early December; card upgrades based on real-world winter form

  - name: TOTY
    window_start: "01-06"
    window_end: "01-20"
    notes: Team of the Year; biggest price spike of the year for high-rated players

  - name: Future Stars
    window_start: "01-20"
    window_end: "02-05"
    notes: Young player promo; mid-rated cards can spike

  - name: FUT Birthday
    window_start: "03-20"
    window_end: "04-10"
    notes: Anniversary promo; random card upgrades

  - name: TOTS
    window_start: "04-25"
    window_end: "06-20"
    notes: Team of the Season; league by league rollout; biggest sustained market event

  - name: FUTTIES
    window_start: "07-18"
    window_end: "09-01"
    category: "end_of_cycle"
    notes: "Repeatable 85x10 SBC active. 85-rated cards spike. All other cards face severe supply flood."

  - name: Next Game Launch
    window_start: "09-25"
    window_end: "10-05"
    category: "end_of_cycle"
    notes: New game launch; current game market collapses post-launch
